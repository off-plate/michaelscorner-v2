<style>
  /* loader: the living signature mark. Inline so it paints before anything else. */
  @keyframes mc-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes mc-failsafe { to { opacity:0; visibility:hidden; pointer-events:none; } }
  @keyframes mc-cn-tl { from{opacity:0;transform:translate(-8px,-8px)} to{opacity:1;transform:none} }
  @keyframes mc-cn-br { from{opacity:0;transform:translate(8px,8px)} to{opacity:1;transform:none} }
  #mc-loader{ position:fixed; inset:0; z-index:9999; background:#FAF7F2; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; font-family:'Space Mono',ui-monospace,Menlo,monospace; transition:opacity 260ms cubic-bezier(0.22,0.61,0.36,1); animation:mc-failsafe 0s linear 7s forwards; }
  #mc-loader.mc-hide{ opacity:0; pointer-events:none; }
  #mc-wave{ margin:0; font-size:clamp(22px,4.6vw,40px); line-height:1; letter-spacing:3px; white-space:pre; color:#F2541B; }
  #mc-loader .mc-sig{ position:relative; padding:18px 26px; }
  #mc-loader .mc-sig .cn{ position:absolute; width:15px; height:15px; border:2px solid #F2541B; }
  #mc-loader .mc-sig .cn.tl{ top:0; left:0; border-right:0; border-bottom:0; animation:mc-cn-tl 240ms cubic-bezier(0.22,0.61,0.36,1) backwards; }
  #mc-loader .mc-sig .cn.br{ bottom:0; right:0; border-left:0; border-top:0; animation:mc-cn-br 240ms 60ms cubic-bezier(0.22,0.61,0.36,1) backwards; }
  #mc-loader .mc-name{ font-size:11px; letter-spacing:0.4em; color:#8a847a; text-transform:uppercase; padding-left:0.4em; }
  #mc-loader .mc-cur{ color:#F2541B; animation:mc-blink 1s steps(1) infinite; }
  @media (prefers-reduced-motion: reduce){ #mc-loader .mc-sig .cn{ animation:none !important; } }
</style>
<link rel="stylesheet" href="styles.css">
