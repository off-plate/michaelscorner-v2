<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 &#8212; Michaels Corner</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/favicon.svg">
<link rel="stylesheet" href="assets/fonts/fonts.css">
<style>
  :root {
    --cream: #FAF7F2;
    --ink: #15130F;
    --muted: #5b564d;
    --accent: #F2541B;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  html { overflow: hidden; }
  ::selection { background: var(--accent); color: var(--cream); }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'General Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(16px, 3.5vh, 44px) 20px clamp(38px, 6vh, 56px);
    gap: clamp(12px, 2.6vh, 40px);
  }
  #render {
    display: block;
    width: min(86vw, 52vh, 460px);
    height: min(86vw, 52vh, 460px);
    image-rendering: pixelated;
  }
  .num {
    font-family: 'Clash Display', sans-serif;
    font-weight: 700;
    font-size: clamp(52px, 12vw, 128px);
    line-height: 0.9;
    letter-spacing: -0.03em;
    margin: 0;
  }
  .copy {
    margin: 0;
    font-size: clamp(17px, 2.4vw, 22px);
    line-height: 1.5;
    color: var(--muted);
    max-width: 32ch;
  }
  .home {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    color: var(--cream);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 26px;
    border-radius: 2px;
    transition: background 150ms ease, color 150ms ease;
  }
  .home:hover { background: var(--accent); color: var(--cream); }
  .home .arr { transition: transform 150ms ease; }
  .home:hover .arr { transform: translateX(3px); }
  .stack { display: flex; flex-direction: column; align-items: center; gap: clamp(14px, 3vh, 26px); }
  .wm {
    position: fixed;
    left: 0; right: 0;
    bottom: clamp(18px, 4vh, 34px);
    text-align: center;
    font-family: 'Clash Display', sans-serif;
    font-weight: 700;
    font-size: clamp(15px, 1.8vw, 19px);
    letter-spacing: -0.01em;
    color: var(--accent);
    pointer-events: none;
  }
  @media (max-height: 560px) and (orientation: landscape) {
    body { flex-direction: row; gap: clamp(18px, 4vw, 48px); padding: 14px 24px; }
    #render { width: min(46vw, 80vh, 340px); height: min(46vw, 80vh, 340px); }
    .stack { align-items: flex-start; text-align: left; }
    .copy { text-align: left; }
    .wm { left: auto; right: clamp(16px, 4vw, 32px); bottom: 12px; text-align: right; }
  }
</style>
</head>
<body>
  <canvas id="render" width="460" height="460" aria-hidden="true"></canvas>
  <div class="stack">
    <h1 class="num">404</h1>
    <p class="copy">My whole site is a handful of pages. How the f*ck did you end up here?</p>
    <a class="home" href="index.html">Back to homepage <span class="arr">&#8594;</span></a>
  </div>

  <footer class="wm">Michaels Corner</footer>

<script>
(function () {
  var canvas = document.getElementById('render');
  var ctx = canvas.getContext('2d');

  // ---- rotating dot-matrix planet: a lit 3D globe with drifting continents ----
  var COLS = 88, ROWS = 88;
  var zbuf = new Float32Array(COLS * ROWS);
  var bri  = new Float32Array(COLS * ROWS);
  var K2 = 5;
  var K1 = COLS * 1.9;
  var tilt = 0.42;
  var spin = 0;
  var size = 460, dpr = 1;

  var Lx = -0.45, Ly = 0.55, Lz = -0.70;
  var Lm = Math.sqrt(Lx * Lx + Ly * Ly + Lz * Lz); Lx /= Lm; Ly /= Lm; Lz /= Lm;

  function isLand(x, y, z) {
    var n = Math.sin(x * 2.3 + 1.0)
          + Math.cos(y * 3.1 - 0.5)
          + Math.sin(z * 2.7 + 2.0)
          + 0.6 * Math.sin(x * 5.1 + y * 3.0 - 1.2)
          + 0.6 * Math.cos(z * 4.3 - x * 2.0)
          + 0.5 * Math.sin((x + y + z) * 3.7 + 0.3);
    return n > 0.85 ? 1 : 0;
  }

  var bxA = [], byA = [], bzA = [], landA = [];
  (function buildGlobe() {
    for (var v = 0.0; v < 3.1416; v += 0.02) {
      var sv = Math.sin(v), cv = Math.cos(v);
      for (var u = 0.0; u < 6.2832; u += 0.02) {
        var bx = sv * Math.cos(u), by = cv, bz = sv * Math.sin(u);
        bxA.push(bx); byA.push(by); bzA.push(bz);
        landA.push(isLand(bx, by, bz));
      }
    }
  })();
  var N = bxA.length;

  function resize() {
    var css = Math.min(window.innerWidth * 0.86, window.innerHeight * 0.52, 460);
    size = css;
    dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(css * dpr);
    canvas.height = Math.round(css * dpr);
    canvas.style.width = css + 'px';
    canvas.style.height = css + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function compute() {
    zbuf.fill(-Infinity);
    bri.fill(0);
    var cosS = Math.cos(spin), sinS = Math.sin(spin);
    var cosT = Math.cos(tilt), sinT = Math.sin(tilt);
    for (var k = 0; k < N; k++) {
      var bx = bxA[k], by = byA[k], bz = bzA[k];
      var x2 = bx * cosS + bz * sinS;
      var z1 = bz * cosS - bx * sinS;
      var y2 = by * cosT - z1 * sinT;
      var z2 = by * sinT + z1 * cosT;
      var lam = x2 * Lx + y2 * Ly + z2 * Lz;
      if (lam < 0) lam = 0;
      var shade = 0.20 + 0.80 * lam;
      var b = landA[k] ? shade : shade * 0.45;
      var z = z2 + K2, ooz = 1 / z;
      var xp = (COLS / 2 + K1 * ooz * x2) | 0;
      var yp = (ROWS / 2 - K1 * ooz * y2) | 0;
      if (xp < 0 || xp >= COLS || yp < 0 || yp >= ROWS) continue;
      var idx = xp + yp * COLS;
      if (ooz > zbuf[idx]) { zbuf[idx] = ooz; bri[idx] = b; }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, size, size);
    var spacing = size / COLS;
    ctx.fillStyle = '#15130F';
    for (var j = 0; j < ROWS; j++) {
      for (var i = 0; i < COLS; i++) {
        var b = bri[i + j * COLS];
        if (b <= 0.03) continue;
        if (b > 1) b = 1;
        var r = spacing * (0.12 + b * 0.46);
        ctx.beginPath();
        ctx.arc((i + 0.5) * spacing, (j + 0.5) * spacing, r, 0, 6.2832);
        ctx.fill();
      }
    }
  }

  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function loop() {
    compute();
    draw();
    spin += 0.011;
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  resize();
  if (reduce) { compute(); draw(); }
  else loop();
})();
</script>
</body>
</html>
